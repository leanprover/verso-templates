on:
  push:
    branches:
      - main
  pull_request:

name: Consistent dependencies

jobs:
  build:
    name: consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for consistent Subverso versions in all manifests
        run: |
          # Get the Subverso revision from basic-blog manifest (the reference)
          ROOT_REV=$(jq -r '.packages[] | select(.name == "subverso") | .rev' ./basic-blog/lake-manifest.json)
          echo "Root SubVerso revision: $ROOT_REV"

          # Get the Subverso repository URL
          SUBVERSO_URL=$(jq -r '.packages[] | select(.name == "subverso") | .url' ./basic-blog/lake-manifest.json)
          echo "SubVerso repository: $SUBVERSO_URL"

          # Get the de-modulized version SHA using git ls-remote
          DEMOD_REV=$(git ls-remote "$SUBVERSO_URL" "refs/tags/no-modules/$ROOT_REV" | awk '{print $1}')
          echo "De-modulized SubVerso revision: $DEMOD_REV"

          echo ""
          echo "Valid SubVerso revisions are:"
          echo "  - $ROOT_REV (root/modulized)"
          echo "  - $DEMOD_REV (de-modulized)"
          echo ""

          # Show all Subverso versions in the repository
          echo "SubVerso versions in all manifests:"
          find . -name lake-manifest.json -not -path '*/.lake/*' -print0 | xargs -0 jq --arg file input_filename '.packages[] | select(.name == "subverso") | {"file": $file, "subverso": .rev}'
          echo ""

          # Check that all manifests use one of the two valid revisions
          find . -name lake-manifest.json -not -path '*/.lake/*' -print0 | \
            xargs -0 jq -e --arg root "$ROOT_REV" --arg demod "$DEMOD_REV" \
            'all(.packages[] | select(.name == "subverso") | .rev; . == $root or . == $demod)'

      - name: Check for consistent Verso versions in all manifests
        run: |
          echo "Verso versions:"
          find . -name lake-manifest.json -not -path '*/.lake/*' -print0 | xargs -0 jq '.packages[] | select(.name == "verso") | {"file": input_filename, "verso": .rev}'
          find . -name lake-manifest.json -not -path '*/.lake/*' -print0 | xargs -0 jq -e -s 'map(.packages[] | select(.name == "verso").rev) | .[0] as $x | all(.[]; . == $x)'
